name: Update Version

on:
  push:
    branches: [main]

jobs:
  update-version:
    runs-on: ubuntu-latest
    # Skip if this is the version-update commit itself to avoid infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: update version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version to today's date
        run: |
          VERSION=$(date -u +'%Y.%m.%d.%H%M%S')
          sed -i "s/var APP_VERSION = '[^']*'/var APP_VERSION = '$VERSION'/" js/state.js
          echo "Version set to $VERSION"

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/state.js
          git diff --cached --quiet || git commit -m "chore: update version to $(date -u +'%Y.%m.%d.%H%M%S')"
          git push
